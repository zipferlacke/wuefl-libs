<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SelectPicker — Konfigurator</title>
  <style>
    @import url('../css/fonts/google-icons-rounded.css');
    @layer resets, components;
    @layer resets {
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    }

    :root {
      --paper:   #f5f4f0;
      --surface: #ffffff;
      --ink:     #18181b;
      --ink-2:   #52525b;
      --ink-3:   #a1a1aa;
      --line:    #e4e4e7;
      --accent:  #1d4ed8;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
    }

    html, body { height: 100%; }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); font-size: 14px; display: flex; flex-direction: column; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--paper); border-bottom: 1px solid var(--line);
      padding: .65rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .nav-brand { font-family: var(--mono); font-size: .88rem; font-weight: 500; color: var(--ink); text-decoration: none; }
    .nav-sub   { font-family: var(--mono); font-size: .75rem; color: var(--ink-3); }
    nav a { font-family: var(--mono); font-size: .75rem; color: var(--ink-2); text-decoration: none; }
    nav a:hover { color: var(--ink); }

    .layout { display: grid; grid-template-columns: 280px 1fr; flex: 1; min-height: 0; }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } .panel-controls { max-height: 50vh; } }

    /* ── Controls ── */
    .panel-controls { background: var(--surface); border-right: 1px solid var(--line); overflow-y: auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1.25rem; }

    .ctrl-group { display: flex; flex-direction: column; gap: .5rem; }
    .ctrl-group-title { font-family: var(--mono); font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); padding-bottom: .4rem; border-bottom: 1px solid var(--line); }

    .ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    .ctrl-label { font-size: .82rem; color: var(--ink-2); flex: 1; white-space: nowrap; }

    input[type="text"], input[type="color"], select.ctrl-select {
      font-family: var(--mono); font-size: .78rem;
      border: 1px solid var(--line); border-radius: 4px;
      padding: .25rem .4rem; background: var(--paper); color: var(--ink);
    }
    input[type="text"]  { width: 130px; }
    input[type="color"] { width: 36px; height: 28px; padding: 2px; cursor: pointer; border-radius: 4px; }
    select.ctrl-select  { padding: .25rem .4rem; }

    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--line); border-radius: 20px; transition: background .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    input[type="range"] { width: 100px; accent-color: var(--accent); }
    .range-val { font-family: var(--mono); font-size: .75rem; color: var(--ink-3); width: 3rem; text-align: right; }
    .ctrl-full input[type="text"] { width: 100%; }

    /* ── Preview + Code ── */
    .panel-right { display: flex; flex-direction: column; min-height: 0; }
    .preview-area { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 2rem 2rem; background: var(--paper); position: relative; }
    .preview-label { position: absolute; top: .75rem; left: 1rem; font-family: var(--mono); font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); }
    .preview-inner { min-width: 200px; }

    .code-area { border-top: 1px solid var(--line); background: var(--ink); flex-shrink: 0; }
    .code-header { display: flex; align-items: center; justify-content: space-between; padding: .5rem 1rem; border-bottom: 1px solid #3f3f46; }
    .code-header span { font-family: var(--mono); font-size: .7rem; color: #71717a; }
    .copy-btn { display: flex; align-items: center; gap: .3rem; padding: .25rem .6rem; background: #3f3f46; border: none; border-radius: 4px; color: #d4d4d8; font-family: var(--mono); font-size: .72rem; cursor: pointer; transition: background .15s; }
    .copy-btn:hover { background: #52525b; }
    .copy-btn.copied { background: #166534; color: #bbf7d0; }

    pre#codeOutput { margin: 0; padding: 1rem 1.25rem; overflow-x: auto; max-height: 260px; overflow-y: auto; font-family: var(--mono); font-size: .78rem; line-height: 1.8; color: #e4e4e7; background: transparent; border-radius: 0; }
    .kw   { color: #f87171; } .str  { color: #86efac; }
    .cmt  { color: #52525b; font-style: italic; }
    .fn   { color: #c084fc; } .num  { color: #60a5fa; }
    .prop { color: #fbbf24; }

    /* Seiten-Icons */
    .msr {
      font-family: 'Material Symbols Rounded'; font-weight: normal; font-style: normal;
      font-size: 16px; line-height: 1; letter-spacing: normal; text-transform: none;
      display: inline-block; white-space: nowrap; direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:.75rem;">
    <a class="nav-brand" href="index.html">← SelectPicker</a>
    <span class="nav-sub">/ Konfigurator</span>
  </div>
  <a href="index.html">Dokumentation</a>
</nav>

<div class="layout">

  <!-- ── CONTROLS ── -->
  <div class="panel-controls">

    <!-- Allgemein -->
    <div class="ctrl-group">
      <div class="ctrl-group-title">Allgemein</div>
      <div class="ctrl-row ctrl-full">
        <label class="ctrl-label">Titel</label>
        <input type="text" id="cfg-title" value="Option wählen">
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Sprache</label>
        <select class="ctrl-select" id="cfg-lang">
          <option value="de">Deutsch</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Multiselect</label>
        <label class="toggle"><input type="checkbox" id="cfg-multi"><span class="toggle-slider"></span></label>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Suchfeld</label>
        <label class="toggle"><input type="checkbox" id="cfg-search" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Speichern-Button</label>
        <label class="toggle"><input type="checkbox" id="cfg-save"><span class="toggle-slider"></span></label>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Reset-Button</label>
        <label class="toggle"><input type="checkbox" id="cfg-reset"><span class="toggle-slider"></span></label>
      </div>
    </div>

    <!-- Farben -->
    <div class="ctrl-group">
      <div class="ctrl-group-title">Farben</div>
      <div class="ctrl-row"><label class="ctrl-label">Trigger Hintergrund</label><input type="color" id="col-trigger" value="#e5e5e5"></div>
      <div class="ctrl-row"><label class="ctrl-label">Picker Hintergrund</label><input type="color" id="col-picker"  value="#e5e5e5"></div>
      <div class="ctrl-row"><label class="ctrl-label">Akzentfarbe</label>        <input type="color" id="col-accent"  value="#1d50ff"></div>
    </div>

    <!-- Größen -->
    <div class="ctrl-group">
      <div class="ctrl-group-title">Größen</div>
      <div class="ctrl-row">
        <label class="ctrl-label">Border-Radius</label>
        <input type="range" id="rng-br" min="0" max="1.5" step="0.05" value="0.5">
        <span class="range-val" id="lbl-br">0.5rem</span>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Button-Höhe</label>
        <input type="range" id="rng-h" min="1.5" max="3" step="0.1" value="2">
        <span class="range-val" id="lbl-h">2rem</span>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Schrift Header</label>
        <input type="range" id="rng-fsh" min="0.75" max="1.5" step="0.05" value="1">
        <span class="range-val" id="lbl-fsh">1rem</span>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label">Schrift Optionen</label>
        <input type="range" id="rng-fso" min="0.7" max="1.25" step="0.05" value="0.9">
        <span class="range-val" id="lbl-fso">0.9rem</span>
      </div>
    </div>

    <!-- Übersetzungen -->
    <div class="ctrl-group">
      <div class="ctrl-group-title">Übersetzungen (DE)</div>
      <div class="ctrl-row ctrl-full"><label class="ctrl-label">Leer</label>      <input type="text" id="t-empty"  value="Nichts gewählt..."></div>
      <div class="ctrl-row ctrl-full"><label class="ctrl-label">Suche</label>     <input type="text" id="t-search" value="Suche..."></div>
      <div class="ctrl-row ctrl-full"><label class="ctrl-label">Keine Daten</label><input type="text" id="t-nodata" value="Keine Daten..."></div>
      <div class="ctrl-row ctrl-full"><label class="ctrl-label">Speichern</label> <input type="text" id="t-save"   value="Speichern"></div>
      <div class="ctrl-row ctrl-full"><label class="ctrl-label">Zurücksetzen</label><input type="text" id="t-reset" value="Zurücksetzen"></div>
    </div>

  </div>

  <!-- ── PREVIEW + CODE ── -->
  <div class="panel-right">
    <div class="preview-area">
      <span class="preview-label">Live-Vorschau</span>
      <div class="preview-inner" id="previewMount">
        <select id="previewSelect">
          <option value="">— bitte wählen —</option>
          <option value="a" data-icon="home">Startseite</option>
          <option value="b" data-icon="inbox">Posteingang</option>
          <option value="c" data-icon="settings">Einstellungen</option>
          <option value="d" data-icon="contacts">Kontakte</option>
          <option value="e" data-icon="calendar_month">Kalender</option>
        </select>
      </div>
    </div>

    <div class="code-area">
      <div class="code-header">
        <span>Generierter Code</span>
        <button class="copy-btn" id="copyBtn">
          <span class="msr">content_copy</span> Kopieren
        </button>
      </div>
      <pre id="codeOutput"></pre>
    </div>
  </div>

</div>

<script type="module">
import { SelectPicker } from './selectpicker_v1_0_0.js';

// ── State ──────────────────────────────────────────────────────────────────────
const cfg = {
  title:      'Option wählen',
  lang:       'de',
  multi:      false,
  search:     true,
  saveButton: false,
  reset:      false,
  colors: {
    trigger: '#e5e5e5',
    picker:  '#e5e5e5',
    accent:  '#1d50ff',
  },
  sizes: { br: '0.5', h: '2', fsh: '1', fso: '0.9' },
  translations: {
    de: { empty: 'Nichts gewählt...', search: 'Suche...', search_nodata: 'Keine Daten...', save: 'Speichern', reset: 'Zurücksetzen' },
    en: { empty: 'Nothing selected...', search: 'Search...', search_nodata: 'Nothing found...', save: 'Save', reset: 'Reset' }
  }
};

// ── Picker-Management ──────────────────────────────────────────────────────────
let pickerInstance = null;
let selectpicker   = null;

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; } else {
    const d = max-min; s = l > .5 ? d/(2-max-min) : d/(max+min);
    switch(max){ case r: h=(g-b)/d+(g<b?6:0); break; case g: h=(b-r)/d+2; break; case b: h=(r-g)/d+4; break; }
    h /= 6;
  }
  return `hsl(${Math.round(h*360)},${Math.round(s*100)}%,${Math.round(l*100)}%)`;
}

function applyPickerVars() {
  const el = document.getElementById('previewMount');
  const { colors: c, sizes: s } = cfg;
  el.style.setProperty('--clr-picker-trigger', hexToHsl(c.trigger));
  el.style.setProperty('--clr-picker',         hexToHsl(c.picker));
  el.style.setProperty('--clr-picker-input',   hexToHsl(c.accent));
  el.style.setProperty('--br-picker',           s.br  + 'rem');
  el.style.setProperty('--height-input-picker', s.h   + 'rem');
  el.style.setProperty('--fs-picker-header',    s.fsh + 'rem');
  el.style.setProperty('--fs-input-picker',     s.fso + 'rem');
}

function rebuildPicker() {
  if (pickerInstance) pickerInstance.close();

  const oldTrigger = document.querySelector('#previewMount .sp_trigger');
  if (oldTrigger) oldTrigger.remove();

  const sel = document.getElementById('previewSelect');
  sel.multiple = cfg.multi;
  sel.style.display = '';
  Array.from(sel.options).forEach(o => o.selected = false);
  if (cfg.reset) sel.dataset.default = '["a"]';
  else           delete sel.dataset.default;

  applyPickerVars();

  selectpicker   = new SelectPicker({ lang: cfg.lang, translations: cfg.translations });
  pickerInstance = selectpicker.create(sel, {
    title:      cfg.title,
    search:     cfg.search,
    saveButton: cfg.saveButton,
  });

  setTimeout(() => {
    const rb = document.querySelector('#previewMount .sp_btn_reset');
    if (rb) rb.hidden = !cfg.reset;
  }, 50);

  generateCode();
}

// ── Code-Generator ─────────────────────────────────────────────────────────────
function generateCode() {
  const { colors: c, sizes: s, translations: t } = cfg;

  let css = `<span class="cmt">/* CSS Custom Properties */</span>\n:root {\n`;
  css += `  <span class="prop">--clr-picker-trigger</span>: <span class="str">${hexToHsl(c.trigger)}</span>;\n`;
  css += `  <span class="prop">--clr-picker</span>:         <span class="str">${hexToHsl(c.picker)}</span>;\n`;
  css += `  <span class="prop">--clr-picker-input</span>:   <span class="str">${hexToHsl(c.accent)}</span>;\n`;
  if (s.br  !== '0.5') css += `  <span class="prop">--br-picker</span>:           <span class="str">${s.br}rem</span>;\n`;
  if (s.h   !== '2')   css += `  <span class="prop">--height-input-picker</span>: <span class="str">${s.h}rem</span>;\n`;
  if (s.fsh !== '1')   css += `  <span class="prop">--fs-picker-header</span>:    <span class="str">${s.fsh}rem</span>;\n`;
  if (s.fso !== '0.9') css += `  <span class="prop">--fs-input-picker</span>:     <span class="str">${s.fso}rem</span>;\n`;
  css += `}\n`;

  const deT = t.de;
  const hasCustomT = deT.empty !== 'Nichts gewählt...' || deT.search !== 'Suche...' ||
    deT.search_nodata !== 'Keine Daten...' || deT.save !== 'Speichern' || deT.reset !== 'Zurücksetzen';

  let transBlock = '';
  if (hasCustomT) {
    transBlock = `,\n  <span class="prop">translations</span>: {\n    <span class="prop">de</span>: {\n`;
    transBlock += `      <span class="prop">empty</span>:        <span class="str">'${deT.empty}'</span>,\n`;
    transBlock += `      <span class="prop">search</span>:       <span class="str">'${deT.search}'</span>,\n`;
    transBlock += `      <span class="prop">search_nodata</span>:<span class="str">'${deT.search_nodata}'</span>,\n`;
    transBlock += `      <span class="prop">save</span>:         <span class="str">'${deT.save}'</span>,\n`;
    transBlock += `      <span class="prop">reset</span>:        <span class="str">'${deT.reset}'</span>\n`;
    transBlock += `    }\n  }`;
  }

  let js = `<span class="kw">import</span> { SelectPicker } <span class="kw">from</span> <span class="str">'./selectpicker_v1_0_0.js'</span>;\n\n`;
  js += `<span class="kw">const</span> selectpicker = <span class="kw">new</span> <span class="fn">SelectPicker</span>({\n`;
  js += `  <span class="prop">lang</span>: <span class="str">'${cfg.lang}'</span>${transBlock}\n});\n\n`;
  js += `selectpicker.<span class="fn">create</span>(\n`;
  js += `  document.<span class="fn">getElementById</span>(<span class="str">'meinSelect'</span>),\n  {\n`;
  js += `    <span class="prop">title</span>: <span class="str">'${cfg.title}'</span>`;
  if (!cfg.search)     js += `,\n    <span class="prop">search</span>: <span class="num">false</span>`;
  if (cfg.saveButton)  js += `,\n    <span class="prop">saveButton</span>: <span class="num">true</span>`;
  js += `\n  }\n);\n`;

  if (cfg.multi || cfg.reset) {
    js += `\n<span class="cmt">/* HTML */</span>\n`;
    js += `<span class="cmt">&lt;select id="meinSelect"`;
    if (cfg.multi) js += ` multiple`;
    if (cfg.reset) js += ` data-default='["a"]'`;
    js += `&gt;\n  &lt;option value="a"&gt;Option A&lt;/option&gt;\n&lt;/select&gt;</span>`;
  }

  document.getElementById('codeOutput').innerHTML = css + '\n' + js;
}

// ── Controls verdrahten ────────────────────────────────────────────────────────
document.getElementById('cfg-title').addEventListener('input',  e => { cfg.title = e.target.value; rebuildPicker(); });
document.getElementById('cfg-lang').addEventListener('change',  e => { cfg.lang  = e.target.value; rebuildPicker(); });
document.getElementById('cfg-multi').addEventListener('change', e => { cfg.multi = e.target.checked; rebuildPicker(); });
document.getElementById('cfg-search').addEventListener('change',e => { cfg.search = e.target.checked; rebuildPicker(); });
document.getElementById('cfg-save').addEventListener('change',  e => { cfg.saveButton = e.target.checked; rebuildPicker(); });
document.getElementById('cfg-reset').addEventListener('change', e => { cfg.reset = e.target.checked; rebuildPicker(); });

document.getElementById('col-trigger').addEventListener('input', e => { cfg.colors.trigger = e.target.value; applyPickerVars(); generateCode(); });
document.getElementById('col-picker').addEventListener('input',  e => { cfg.colors.picker  = e.target.value; applyPickerVars(); generateCode(); });
document.getElementById('col-accent').addEventListener('input',  e => { cfg.colors.accent  = e.target.value; applyPickerVars(); generateCode(); });

[
  ['rng-br','br','lbl-br'],
  ['rng-h','h','lbl-h'],
  ['rng-fsh','fsh','lbl-fsh'],
  ['rng-fso','fso','lbl-fso'],
].forEach(([rid, key, lid]) => {
  document.getElementById(rid).addEventListener('input', e => {
    cfg.sizes[key] = e.target.value;
    document.getElementById(lid).textContent = e.target.value + 'rem';
    applyPickerVars(); generateCode();
  });
});

['empty','search','save','reset'].forEach(key => {
  const el = document.getElementById('t-' + key);
  if (el) el.addEventListener('input', e => { cfg.translations.de[key] = e.target.value; generateCode(); });
});
document.getElementById('t-nodata').addEventListener('input', e => {
  cfg.translations.de.search_nodata = e.target.value; generateCode();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('codeOutput').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '<span class="msr">check</span> Kopiert';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<span class="msr">content_copy</span> Kopieren';
    }, 2000);
  });
});

// ── Init ───────────────────────────────────────────────────────────────────────
rebuildPicker();
</script>
</body>
</html>
